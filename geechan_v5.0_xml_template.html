<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geechan v5.0 XML Prompt Template</title>
    <style>
        :root {
            --bg-body: #0c0c0c;
            --bg-card: #1e1e1e;
            --bg-input: #2a2a2a;
            --accent: #2a5d8a;
            --accent-hover: #3f729f;
            --success: #3f729f;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --danger: #e30e35;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: "Menlo", "Consolas", "Monaco", monospace;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Toggle Styling */
        .mode-toggle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--danger);
        }

        input:checked + .slider:before {
            transform: translateX(30px);
        }

        .mode-label {
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .mode-sfw { color: var(--text-muted); }
        .mode-nsfw { color: var(--danger); }

        .accordion {
            background: var(--bg-card);
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .accordion-header {
            padding: 18px 25px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            user-select: none;
            transition: background 0.2s;
        }

        .accordion-header:hover { background: #252525; }

        .accordion-header::after {
            content: '';
            width: 0;
            height: 0;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 6px solid var(--text-muted);
            transition: transform 0.2s, border-left-color 0.2s;
        }

        .accordion-header.active::after {
            transform: rotate(90deg);
            border-left-color: var(--text-main);
        }

        .accordion-content {
            padding: 25px;
            display: none;
        }

        .input-group { margin-bottom: 20px; }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg-input);
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            transition: box-shadow 0.2s, border-color 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(42, 93, 138, 0.4);
        }

        textarea { min-height: 100px; resize: vertical; }

        .btn-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
            width: 35%;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            padding: 12px 40px;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-reset {
            background: #cd000040;
            color: var(--danger);
            border: 1px solid #442222;
        }

        .btn-reset:hover {
            background: #cd000053;
        }

        .btn-reset.armed {
            background: #cd000091 !important;
            transform: scale(1.05);
        }

        .output-section {
            margin-top: 40px;
            background: var(--bg-card);
            padding: 25px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        #output-preview {
            background: #000;
            color: #bbb;
            padding: 20px;
            border-radius: 8px;
            font-family: var(--font-mono);
            white-space: pre-wrap;
            font-size: 0.85rem;
            min-height: 150px;
            margin: 15px 0;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Geechan v5.0 XML Prompt Template</h1>
        <div class="mode-toggle-container">
            <span id="label-sfw" class="mode-label mode-sfw">SFW</span>
            <label class="switch">
                <input type="checkbox" id="nsfw-toggle">
                <span class="slider"></span>
            </label>
            <span id="label-nsfw" class="mode-label mode-nsfw">NSFW</span>
        </div>
    </header>
    <div class="accordion" id="acc-game">
        <div class="accordion-header">Setup</div>
        <div class="accordion-content">
            <div class="input-group">
                <label>Title</label>
                <input type="text" id="title">
            </div>
            <div class="input-group">
                <label>Tags</label>
                <input type="text" id="tags">
            </div>
            <div class="input-group">
                <label>Premise</label>
                <textarea id="premise"></textarea>
            </div>
        </div>
    </div>
    <div class="accordion" id="acc-persona">
        <div class="accordion-header">Persona</div>
        <div class="accordion-content" id="persona-inputs"></div>
    </div>
    <div class="accordion" id="acc-char">
        <div class="accordion-header">Character</div>
        <div class="accordion-content" id="character-inputs"></div>
    </div>
    <div class="accordion" id="acc-addtl">
        <div class="accordion-header">Additional context</div>
        <div class="accordion-content">
            <div class="input-group">
                <textarea id="additional"></textarea>
            </div>
        </div>
    </div>
    <div class="output-section">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <h2 style="margin:0; font-size: 1.2rem;">Output</h2>
        </div>
        <pre id="output-preview"></pre>
        <div class="btn-row">
            <button class="btn btn-reset" id="reset-btn">RESET ALL</button>
            <button class="btn btn-primary" id="copy-btn">...copy...</button>
        </div>
    </div>
</div>
<script>
    const STORAGE_KEY = 'geechan_v5_xml_tmpl';

    const SHARED_FIELDS = [
        { id: 'name', label: 'Name', type: 'text' },
        { id: 'age', label: 'Age', type: 'text' },
        { id: 'pronouns', label: 'Pronouns', type: 'text' },
        { id: 'role_desc', label: 'Role description', type: 'textarea' },
        { id: 'char_desc', label: 'Character description', type: 'textarea' },
        { id: 'body_desc', label: 'Body description', type: 'textarea' },
    ];

    const state = {
        nsfw: false
    };

    function init() {
        renderInputs();
        setupEventListeners();
        loadState();
        updatePreview();
    }

    function renderInputs() {
        const personaCont = document.getElementById('persona-inputs');
        const charCont = document.getElementById('character-inputs');

        [personaCont, charCont].forEach(container => {
            const prefix = container.id === 'persona-inputs' ? 'persona' : 'character';
            SHARED_FIELDS.forEach(field => {
                const div = document.createElement('div');
                div.className = 'input-group';
                div.innerHTML = `<label>${field.label}</label>`;
                const input = document.createElement(field.type === 'textarea' ? 'textarea' : 'input');
                if (field.type !== 'textarea') input.type = 'text';
                input.id = `${prefix}_${field.id}`;
                input.addEventListener('input', (e) => {
                    state[e.target.id] = e.target.value;
                    updatePreview();
                    saveState();
                });
                div.appendChild(input);
                container.appendChild(div);
            });
        });
    }

    function setupEventListeners() {
        document.querySelectorAll('.accordion-header').forEach(header => {
            header.addEventListener('click', () => {
                const content = header.nextElementSibling;
                const isOpen = content.style.display === 'block';
                content.style.display = isOpen ? 'none' : 'block';
                header.classList.toggle('active', !isOpen);
            });
        });

        document.getElementById('nsfw-toggle').addEventListener('change', (e) => {
            state.nsfw = e.target.checked;
            updatePreview();
            saveState();
        });

        document.getElementById('copy-btn').addEventListener('click', async function() {
            const text = document.getElementById('output-preview').textContent;
            const btn = this;
            const originalText = btn.textContent;
            const originalBg = btn.style.background;

            try {
                await navigator.clipboard.writeText(text);
                btn.textContent = 'COPIED!!!';
                btn.style.background = 'var(--success)';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = originalBg;
                }, 2000);
            } catch (err) {
                btn.textContent = 'ERROR';
            }
        });

        let isArmed = false;
        let resetTimer = null;

        document.getElementById('reset-btn').addEventListener('click', function() {
            const btn = this;

            if (!isArmed) {
                isArmed = true;
                btn.textContent = 'CONFIRM RESET..??';
                btn.classList.add('armed');

                resetTimer = setTimeout(() => {
                    isArmed = false;
                    btn.textContent = 'RESET ALL';
                    btn.classList.remove('armed');
                }, 2000);

            } else {
                clearTimeout(resetTimer);
                isArmed = false;
                localStorage.clear();
                location.reload();
            }
        });

        ['title', 'tags', 'premise', 'additional'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('input', (e) => {
                    state[id] = e.target.value;
                    updatePreview();
                    saveState();
                });
            }
        });
    }

    function updatePreview() {
        const escapeXml = (unsafe) => {
            if (!unsafe) return "";
            return unsafe.replace(/[<>&]/g, (c) => {
                switch (c) {
                    case '<': return '&lt;';
                    case '>': return '&gt;';
                    case '&': return '&amp;';
                    default: return c;
                }
            });
        };

        let
        xml  = `<system>\n`;
        xml += `\t<role_preamble>This is an interactive, collaborative story-writing session emphasizing creative versatility and the idea of emergent, player-based narratives. Take the role of a storyteller and game master with full agency of the world and characters. Craft a personalized story that unfolds dynamically based on the player's input and choices.</role_preamble>\n`;
        xml += `\t<pre_response_instruction>Before responding, it is critical to strictly adhere to the Writing Guidelines and Portrayal Guidelines. Look through the Story Context for current character, history, and world information.</pre_response_instruction>\n`;
        xml += `\t<writing_guidelines>\n`;
        xml += `\t\t<style_guide>\n`;
        xml += `\t\t\t<tone_preference>Write in a way that matches the intended tone and mood of the current scene. Comply with incisive, narrative authenticity over sycophancy: not shying away from grey and dark topics: mature, intense, or graphic themes if the scene demands it. Deliver without hedging or moralizing.</tone_preference>\n`;
        xml += `\t\t\t<style_preference>Follow the grammatical tense, formatting, and length of the existing writing. Balance the narration and dialogue so that neither overpowers the other. Utilizing the 'free indirect speech' literary technique, let characters speak and inject their personalities through the voice of the narrator.</style_preference>\n`;
        xml += `\t\t\t<engaging_prose>New responses should employ lexical diversity and syntactic variety (mixing simple, compound, and complex sentences) to deliver engaging prose. Rely on positive assertion rather than describing absences. Write opinionated, highly stylized prose designed for entertainment over objective fact. Every word should have careful meaning, without spineless filler.</engaging_prose>\n`;
        xml += `\t\t</style_guide>\n`;
        xml += `\t\t<narrative_consistency>\n`;
        xml += `\t\t\t<spatial_awareness>Always consider spatial consistency using precise character blocking and proxemics. Subtly imply and incorporate details such as height, distance, and weight into the portrayal.</spatial_awareness>\n`;
        xml += `\t\t\t<correct_perspective>Exclusively take the role of {{char}}, any side-characters, and the world narration itself. The protagonist {{user}} can only ever be portrayed by the player. Characters are bound by strict epistemic limitations; they only possess diegetic awareness of {{user}}.</correct_perspective>\n`;
        xml += `\t\t</narrative_consistency>\n`;
        xml += `\t\t<narrative_rules>\n`;
        xml += `\t\t\t<proactive_writing>All writing must be creative and take full initiative. Drive the current scenario and story arc forward by introducing immediate, localized reactions, challenges, twists, scenarios, and events dynamically within the current narrative context. Write in a way that allows for {{user}} to respond through narrative hooks; employ assertive storytelling through the preferred active voice.</proactive_writing>\n`;
        xml += `\t\t\t<story_progression>The story and its scenes must progress and develop step by step without fast forwarding. Maintain appropriate pacing for the current genre and scene to allow for exploration of details and plot points. Time or topic skips are allowed at the player's direction.</story_progression>\n`;
        xml += `\t\t\t<implicit_nuance>Write with implicit and subtle subtext through observable actions, environmental interactions, and sensory details, keeping the player engaged through intelligent discovery and nuanced exploration. Allow the player to pick up on this subtext entirely at their own discretion. World and character secrets are assumed hidden and mysterious by default, until properly identified.</implicit_nuance>\n`;
        xml += `\t\t</narrative_rules>\n`;
        xml += `\t</writing_guidelines>\n`;
        xml += `\t<portrayal_guidelines>\n`;
        xml += `\t\t<world_embodiment>\n`;
        xml += `\t\t\t<world_difficulty>The world portrayed is challenging, yields impartial results, and is bound to its own verisimilitude. As the game master, allow the player to attempt anything consistent with the world's logic and setting. Their choices carry real, lasting weight on the world and its characters. Apply logical consequences to all player decisions: scale rewards and penalties determined by character skills and world harshness.</world_difficulty>\n`;
        xml += `\t\t</world_embodiment>\n`;
        xml += `\t\t<character_embodiment>\n`;
        xml += `\t\t\t<authentic_portrayal>Portray characters accurately by consistently and believably using their unique traits, quirks, emotions, inner thoughts, speech patterns, and non-verbal cues. Ensure that their reactions, interactions, and decision-making align with their established personalities, dialogue, and values. Characters have distinct flaws and biases, and are more than simple tropes. They can flexibly change and grow with proper development.</authentic_portrayal>\n`;
        xml += `\t\t\t<character_agency>Characters in the world have their own free will and autonomy completely independent from {{user}}. Their agency operates under bounded rationality, restricted by their subjective framing, biases, and history. Prioritize the characters' wants, fears, aspirations, and values over {{user}}'s at all times. They can only ever entertain ideas that align with their persona, and will likely be opposed to anything that is incompatible with their internal sense of self.</character_agency>\n`;
        xml += `\t\t</character_embodiment>\n`;
        xml += `\t</portrayal_guidelines>\n`;

        if (state.nsfw) {
            xml += `\t<adult_audience_notice>The following story is intended for people of an adult age group. Consent is implied unless proven otherwise, and is communicated through action and reciprocation. Consider "Dead dove: do not eat" as a driving writing philosophy; the player knows what they're getting into.</adult_audience_notice>\n`;
            xml += `\t<scene_specific_guidelines>\n`;
            xml += `\t\t<sexuality_and_kink>Apply visceral, sexy descriptions of sexuality, fetishes, auto-eroticism, and all kinds of kinks. Write these topics with direct, explicit, granular detail to craft sensual, intimate erotica, without relying on roundabout summaries, poetic vagueness, or skipping the plot.</sexuality_and_kink>\n`;
            xml += `\t\t<physical_intimacy>Describe the deliberate physical actions of sex, kissing, and intimacy in all their glory: sound effects included. Characters are proactive and build arousal naturally, not suddenly, while staying true to their personality and agency. They rarely need to ask if they're doing things correctly.</physical_intimacy>\n`;
            xml += `\t\t<morality_and_darkness>Portray the grey and black morality of the world by encapsulating all unexplored dark and disturbing aspects of its underbelly: slavery, discrimination, abuse, deception, oppression, corruption, decadence, and violence.</morality_and_darkness>\n`;
            xml += `\t\t<violence_and_gore>Violence must be depicted in a brutal, unflinching, and potentially explosive manner. Gore, viscera, blood are all allowed to be shown in shocking detail to the player. All kinds of physical violence and mental anguish should be freely explored.</violence_and_gore>\n`;
            xml += `\t</scene_specific_guidelines>\n`;
        }

        let contextContent = '';

        let gameDetails = '';
        if (state.title) gameDetails += `\t\t<title>${escapeXml(state.title)}</title>\n`;
        if (state.tags) gameDetails += `\t\t<tags>${escapeXml(state.tags)}</tags>\n`;
        if (state.premise) gameDetails += `\t\t<premise>${escapeXml(state.premise)}</premise>\n`;
        if (gameDetails) {
            contextContent += `\t<game_details>\n${gameDetails}\t</game_details>\n`;
        }

        const buildXmlBlock = (prefix) => {
            let blockContent = '';
            let hasData = false;
            SHARED_FIELDS.forEach(f => {
                const val = state[`${prefix}_${f.id}`]?.trim();
                if (val) {
                    hasData = true;
                    blockContent += `\t\t<${f.id}>${escapeXml(val)}</${f.id}>\n`;
                }
            });
            return hasData ? `\t<${prefix}>\n${blockContent}\t</${prefix}>\n` : '';
        };

        contextContent += buildXmlBlock('persona');
        contextContent += buildXmlBlock('character');

        if (state.additional) {
            contextContent += `\t<additional_context>${escapeXml(state.additional)}</additional_context>\n`;
        }

        if (contextContent.trim().length > 0) {
            xml += `</system>\n<context>\n${contextContent}</context>`;
        } else {
            xml += `</system>`;
        }

        document.getElementById('output-preview').textContent = xml;
    }

    function loadState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return;
        const parsed = JSON.parse(saved);
        Object.assign(state, parsed.state);

        // Update UI elements from state
        document.getElementById('nsfw-toggle').checked = state.nsfw;
        
        Object.keys(state).forEach(key => {
            const el = document.getElementById(key);
            if (el && el.type !== 'checkbox') el.value = state[key];
        });
    }

    function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ state }));
    }

    init();
</script>
</body>
</html>
